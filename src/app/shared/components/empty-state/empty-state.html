<mat-card class="empty-container">
  <div class="empty-content">
    <mat-icon class="empty-icon">
      {{ icon }}
    </mat-icon>

    <h3 class="empty-title">
      {{ title }}
    </h3>

    <p class="empty-text">
      {{ message }}
    </p>

    <button mat-button color="primary" (click)="onAction()">
      <mat-icon>arrow_back</mat-icon>
      {{ buttonText }}
    </button>
  </div>
</mat-card>
