<div class="dialog-container">
  <h2 mat-dialog-title class="dialog-title">
    {{ data.title || 'تأكيد الحذف' }}
  </h2>

  <mat-dialog-content class="dialog-content">
    <div class="flex items-start gap-3">
      <!-- أيقونة تحذير -->
      <div class="warning-icon flex-shrink-0">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      </div>

      <!-- رسالة التأكيد -->
      <div class="flex-1">
        <p class="dialog-message">{{ data.message || 'هل أنت متأكد من حذف هذا العنصر؟' }}</p>
        <p class="dialog-sub-message text-gray-500 text-sm mt-1">هذا الإجراء لا يمكن التراجع عنه</p>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions class="dialog-actions" align="end">
    <button mat-button (click)="onCancel()" class="cancel-btn">
      {{ data.cancelText }}
    </button>

    <button
      mat-raised-button
      color="warn"
      (click)="onConfirm()"
      class="confirm-btn"
      cdkFocusInitial
    >
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>
</div>
