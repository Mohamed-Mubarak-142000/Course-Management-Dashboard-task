<div class="p-6">
  <app-toolbar
    title="Edit Course"
    [showBack]="true"
    (back)="goBack()"
    (save)="triggerSave()"
  ></app-toolbar>

  <!-- عرض مؤشر التحميل أثناء جلب البيانات -->
  <div *ngIf="isLoading" class="flex justify-center items-center py-12">
    <div class="text-center">
      <div
        class="spinner-border animate-spin inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full"
        role="status"
      >
        <span class="sr-only">Loading...</span>
      </div>
      <p class="mt-4 text-gray-600">جاري تحميل بيانات الدورة...</p>
    </div>
  </div>

  <!-- عرض النموذج فقط بعد تحميل البيانات -->
  <app-course-form
    *ngIf="course && !isLoading"
    #formRef
    [course]="course"
    (save)="onSave($event)"
  ></app-course-form>

  <!-- عرض رسالة خطأ في حالة فشل التحميل -->
  <div
    *ngIf="error"
    class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4"
  >
    <strong class="font-bold">خطأ!</strong>
    <span class="block sm:inline"> {{ error }}</span>
  </div>
</div>
