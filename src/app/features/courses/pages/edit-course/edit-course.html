<div class="edit-course-container">
  <!-- Toolbar -->
  <app-toolbar
    title="Edit Course"
    [showBack]="true"
    [actions]="getToolbarActions()"
    (back)="goBack()"
  ></app-toolbar>

  <!-- Loading State -->
  @if (isLoading) {
    <div class="loading-container">
      <div class="loading-content">
        <mat-spinner diameter="48" color="primary"></mat-spinner>
        <p class="loading-text">Loading course data...</p>
      </div>
    </div>
  }

  <!-- Error State -->
  @if (error) {
    <div class="error-container">
      <mat-icon color="warn" class="error-icon">error_outline</mat-icon>
      <h3 class="error-title">Something went wrong</h3>
      <p class="error-text">{{ error }}</p>
      <button mat-raised-button color="primary" (click)="retryLoading()">
        <mat-icon>refresh</mat-icon>
        Try Again
      </button>
    </div>
  }

  <!-- Course Form -->
  @if (course && !isLoading && !error) {
    <div class="form-wrapper">
      <app-course-form #formRef [course]="course" (save)="onSave($event)"></app-course-form>
    </div>
  }
</div>
