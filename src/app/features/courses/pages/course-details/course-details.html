<!-- course-details.html -->
<div class="course-details-container">
  <!-- Toolbar -->
  <app-toolbar
    title="Course Details"
    [showBack]="true"
    [actions]="getToolbarActions()"
    (back)="goBack()"
  ></app-toolbar>

  <!-- LOADING -->
  @if (showLoadingMessage()) {
    <app-loading
      title="Loading Course Details"
      subtitle="Fetching data from server..."
    ></app-loading>
  }

  <!-- ERROR -->
  @if (hasError()) {
    <app-error-state
      [message]="error() ?? 'An unexpected error occurred. Please try again later.'"
      (retry)="retryLoading()"
    ></app-error-state>
  }

  <!-- COURSE DATA -->
  @if (showCourseData()) {
    <mat-card class="course-content">
      <!-- Course Header -->
      <div class="course-header">
        <div class="header-left">
          <h1 class="course-title">{{ course()?.courseName }}</h1>
        </div>
        <div class="header-right">
          <span class="course-price">{{ course()?.price | currency }}</span>
        </div>
      </div>

      <!-- Course Info Grid -->
      <div class="info-grid">
        <app-info-item
          icon="person"
          label="Instructor"
          [value]="course()?.instructorName"
        ></app-info-item>

        <app-info-item
          icon="check_circle"
          label="Status"
          [value]="course()?.status"
        ></app-info-item>

        <!-- Category -->
        <app-info-item
          icon="category"
          label="Category"
          [value]="course()?.category"
        ></app-info-item>

        <!-- Duration -->
        <app-info-item
          icon="schedule"
          label="Duration"
          [value]="course()?.duration + ' hours'"
        ></app-info-item>

        <!-- Created Date -->
        <app-info-item
          icon="event"
          label="Created"
          [value]="course()?.createdDate | date: 'mediumDate'"
        ></app-info-item>
      </div>
      <!-- Description -->
      <div class="description-section">
        <h3>
          <mat-icon color="primary">description</mat-icon>
          Description
        </h3>
        <p class="description-text px-6">
          {{ course()?.description || 'No description available for this course.' }}
        </p>
      </div>
    </mat-card>
  }

  <!-- EMPTY -->
  @if (!loading() && !course() && !error()) {
    <app-empty-state
      icon="info_outline"
      title="No Data Available"
      message="The course information could not be found."
      buttonText="Go Back"
      (action)="goBack()"
    ></app-empty-state>
  }
</div>
