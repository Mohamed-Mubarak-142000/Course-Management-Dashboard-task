<!-- course-list.html -->
<div class="course-list-container">
  <!-- Toolbar with flexible actions -->
  <app-toolbar
    title="Courses Management"
    [showBack]="false"
    [actions]="getToolbarActions()"
  ></app-toolbar>

  <!-- Stats Cards -->
  <div class="stats-container">
    <app-stat-card
      icon="school"
      label="Total Courses"
      [value]="totalCourses()"
      type="total"
    ></app-stat-card>

    <app-stat-card
      icon="school"
      label="Total Courses"
      [value]="totalCourses()"
      type="total"
    ></app-stat-card>

    <app-stat-card
      icon="check_circle"
      label="Active"
      [value]="activeCourses()"
      type="active"
    ></app-stat-card>

    <app-stat-card icon="edit" label="Draft" [value]="draftCourses()" type="draft"></app-stat-card>

    <app-stat-card
      icon="archive"
      label="Archived"
      [value]="archivedCourses()"
      type="archived"
    ></app-stat-card>
  </div>

  <!-- Filter -->
  <div class="filter-wrapper">
    <app-course-filter
      (searchChanged)="onSearch($event)"
      (statusChanged)="onStatusChange($event)"
    ></app-course-filter>
  </div>

  <!-- Loading -->
  @if (loading()) {
    <app-loading
      title="Loading Course Details"
      subtitle="Fetching data from server..."
    ></app-loading>
  } @else {
    <!-- Course Table -->
    @if (filteredCourses().length > 0) {
      <div class="table-wrapper">
        <app-course-table
          [courses]="filteredCourses()"
          (delete)="deleteCourse($event)"
          (edit)="router.navigate(['/courses/edit', $event])"
          (view)="router.navigate(['/courses', $event])"
        ></app-course-table>
      </div>
    } @else {
      <app-empty-state
        icon="search_off"
        [title]="searchTerm() || status() ? 'No Courses Found' : 'No Courses Yet'"
        [message]="
          searchTerm() || status()
            ? 'No courses match your search criteria. Try adjusting your filters.'
            : 'Start by adding your first course!'
        "
        [buttonText]="searchTerm() || status() ? 'Clear Filters' : 'Add Course'"
        (action)="searchTerm() || status() ? clearFilters() : goToAdd()"
      ></app-empty-state>
    }
  }
</div>
