<!-- course-table.html -->
<div class="table-container">
  <table mat-table [dataSource]="courses" class="mat-elevation-z0">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let course">{{ course.id }}</td>
    </ng-container>

    <!-- Course Name Column -->
    <ng-container matColumnDef="courseName">
      <th mat-header-cell *matHeaderCellDef>Course Name</th>
      <td mat-cell *matCellDef="let course">
        <div class="course-name-cell">
          <span class="course-name">{{ course.courseName }}</span>
          <span class="course-code" *ngIf="course.courseCode">({{ course.courseCode }})</span>
        </div>
      </td>
    </ng-container>

    <!-- Instructor Column -->
    <ng-container matColumnDef="instructorName">
      <th mat-header-cell *matHeaderCellDef>Instructor</th>
      <td mat-cell *matCellDef="let course">{{ course.instructorName || 'N/A' }}</td>
    </ng-container>

    <!-- Category Column -->
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let course">
        <span class="category-badge">{{ course.category || 'Uncategorized' }}</span>
      </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let course">
        <mat-chip [class]="getStatusClass(course.status)" [disabled]="true" size="small">
          {{ course.status || 'Unknown' }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Price Column -->
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let course">
        <span class="price-value">{{ course.price | currency }}</span>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
      <td mat-cell *matCellDef="let course" class="actions-cell">
        <button
          mat-icon-button
          color="primary"
          (click)="view.emit(course.id)"
          matTooltip="View Course"
        >
          <mat-icon>visibility</mat-icon>
        </button>
        <button
          mat-icon-button
          color="accent"
          (click)="edit.emit(course.id)"
          matTooltip="Edit Course"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-icon-button
          color="warn"
          (click)="delete.emit(course.id)"
          matTooltip="Delete Course"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
